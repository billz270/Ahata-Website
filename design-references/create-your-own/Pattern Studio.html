<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pattern Studio — Randomized rectangles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F4EFE6;
    --paper: #FAF7F2;
    --ink: #0E1F28;
    --ink-2: #29261b;
    --line: rgba(14,31,40,.10);
    --line-strong: rgba(14,31,40,.18);
    --muted: rgba(14,31,40,.55);
    --accent: #0E1F28;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--app-bg, var(--bg));color:var(--ink);
    font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;
    font-feature-settings:"ss01","cv11";
    -webkit-font-smoothing:antialiased;
  }
  .app{min-height:100vh;background:var(--app-bg);transition:background .25s ease}
  .app.dark{ --ink:#F4EFE6; --ink-2:#F4EFE6; --line:rgba(244,239,230,.10); --line-strong:rgba(244,239,230,.18); --muted:rgba(244,239,230,.55); }

  /* ── Header ─────────────────────────────────────────────────────────── */
  .hdr{
    position:sticky; top:0; z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 40px;
    background:var(--app-bg);
    border-bottom:.5px solid var(--line);
  }
  .hdr-left{display:flex;align-items:center;gap:14px}
  .hdr-mark{width:36px;height:36px;border-radius:8px;background:var(--paper);
    display:grid;place-items:center;border:.5px solid var(--line-strong)}
  .app.dark .hdr-mark{background:#11212B}
  .app.dark .hdr-mark svg rect{fill:#F4EFE6 !important}
  .hdr-title{font-size:15px;font-weight:600;letter-spacing:-0.01em;line-height:1.15}
  .hdr-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .hdr-right{display:flex;align-items:center;gap:14px}
  .seed-tag{font:500 11px/1 'JetBrains Mono',ui-monospace,monospace;
    color:var(--muted);letter-spacing:.02em;
    padding:6px 10px;border:.5px dashed var(--line-strong);border-radius:999px}

  /* ── Buttons ────────────────────────────────────────────────────────── */
  .btn{display:inline-flex;align-items:center;gap:6px;
    border:.5px solid var(--line-strong);border-radius:8px;
    background:var(--paper); color:var(--ink);
    font:500 12px/1 'Inter',sans-serif;
    padding:7px 10px; cursor:pointer; transition:background .12s, transform .08s;
  }
  .btn:hover{background:color-mix(in oklab, var(--paper) 88%, var(--ink) 12%)}
  .btn:active{transform:translateY(.5px)}
  .btn.ghost{background:transparent}
  .btn.ghost:hover{background:color-mix(in oklab, var(--paper) 60%, transparent)}
  .btn.primary{background:var(--ink);color:var(--paper);border-color:transparent}
  .btn.primary:hover{background:color-mix(in oklab, var(--ink) 86%, #fff 14%)}
  .btn.big{padding:9px 14px;font-size:13px;gap:8px}
  .btn svg{flex:0 0 auto}
  .btn kbd{font:500 10px/1 'JetBrains Mono',ui-monospace,monospace;
    background:color-mix(in oklab,var(--paper) 30%, transparent);
    padding:3px 5px; border-radius:4px; border:.5px solid color-mix(in oklab,var(--paper) 40%, transparent);
    color:inherit; opacity:.7; margin-left:2px;}
  .btn.primary kbd{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.2);color:var(--paper)}

  /* ── Stack of cards ─────────────────────────────────────────────────── */
  .stack{max-width:1480px;margin:0 auto;padding:40px;display:flex;flex-direction:column;gap:48px}
  .card{display:flex;flex-direction:column;gap:14px}
  .card-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .card-meta{display:flex;align-items:baseline;gap:14px;min-width:0}
  .card-label{font-size:18px;font-weight:600;letter-spacing:-0.015em}
  .card-dim{font:500 11px/1 'JetBrains Mono',ui-monospace,monospace;color:var(--muted);letter-spacing:.02em}
  .dim-ratio{opacity:.7}
  .card-actions{display:flex;gap:8px;flex-wrap:wrap}

  .card-stage{
    width:100%;
    border-radius:10px;
    overflow:hidden;
    border:.5px solid var(--line);
    box-shadow: 0 1px 0 rgba(255,255,255,.5) inset, 0 6px 24px -16px rgba(14,31,40,.18);
    transition: background .25s ease;
  }
  .app.dark .card-stage{box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 6px 24px -16px rgba(0,0,0,.6)}

  .card-foot{font:500 11px/1 'JetBrains Mono',ui-monospace,monospace;color:var(--muted);letter-spacing:.02em}
  .muted{color:var(--muted)}

  .footer-note{
    margin-top:8px;padding:18px 0 60px;
    color:var(--muted);font-size:12px;text-align:center;
    border-top:.5px dashed var(--line);
  }
  .footer-note kbd{font:500 10px/1 'JetBrains Mono',ui-monospace,monospace;
    background:var(--paper);padding:3px 6px;border-radius:4px;border:.5px solid var(--line-strong);color:var(--ink)}
  .footer-note code{font:500 11px/1 'JetBrains Mono',ui-monospace,monospace;color:var(--ink)}

  @media (max-width:760px){
    .hdr{padding:14px 16px}
    .hdr-sub{display:none}
    .stack{padding:24px 16px;gap:36px}
    .seed-tag{display:none}
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="pattern-engine.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
